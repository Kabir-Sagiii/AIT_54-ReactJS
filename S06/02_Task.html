<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./02_Task.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="text/babel">
      function Nav() {
        return (
          <div id="nav">

                <i class="bi bi-house-check-fill"></i> Home
              </a>
              <a href="">
                <i class="bi bi-person-circle"></i> Profile

              <a href="">
                <i class="bi bi-apple"></i> Products

              <a href="">

              </a>
              <a href="">
                <i class="bi bi-person-lines-fill"></i> Contactus

        return (
          <div className="main">
            <h1>Bright Smiles Kids Collection</h1>
            <p>
              A colorful and cheerful kids shopping background featuring playful
              designs, trendy outfits, toys, and fun accessories. Perfect for

              shopping events, creating an exciting and joyful atmosphere that
              attracts parents and kids with vibrant visuals and lively themes.

      const Footer = () => {

              <div className="footer-brand">
                <h2>KidzyMart</h2>
                <p>
                  Your favorite destination for trendy kids fashion, toys, and
                  accessories with fun shopping experiences.

              <div className="footer-links">
                <h3>Quick Links</h3>
                <ul>
                  <li>
                    <a href="/">Home</a>
                  </li>
                  <li>
                    <a href="/shop">Shop</a>

                  <li>
                    <a href="/categories">Categories</a>

                  <li>
                    <a href="/offers">Offers</a>
                  </li>
                </ul>

              <div className="footer-links">

                <ul>

                    <a href="/contact">Contact Us</a>
                  </li>
                  <li>
                    <a href="/faq">FAQs</a>
                  </li>
                  <li>
                    <a href="/shipping">Shipping</a>
                  </li>
                  <li>
                    <a href="/returns">Returns</a>
                  </li>
                </ul>
              </div>

              <div className="footer-newsletter">
                <h3>Newsletter</h3>
                <p>Subscribe for latest kids fashion updates and offers.</p>

                <div className="newsletter-box">
                  <input type="email" placeholder="Enter your email" />
                  <button>Subscribe</button>
                </div>
              </div>
            </div>

            <div className="footer-bottom">
              <p>© 2026 KidzyMart. All Rights Reserved.</p>
            </div>
          </footer>
        );
      };

      function App() {
        return (
          <div>
            <Nav />
            <Main />
            <Footer />
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
